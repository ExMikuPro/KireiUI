name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g. 0.2.3). If empty on tag trigger, use tag vX.Y.Z."
        required: false
        type: string

jobs:
  build:
    uses: ./.github/workflows/build-all-architectures.yml
    with:
      version: ${{ github.event.inputs.version }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} release/ \;
          ls -lah release

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
