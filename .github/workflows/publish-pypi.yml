name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish (e.g. 0.2.3). If empty on tag trigger, use tag vX.Y.Z."
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine packaging

      - name: Resolve version from tag/input
        id: version
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            echo "No version provided. Use a v* tag or workflow_dispatch input."
            exit 1
          fi
          export VERSION
          python - <<'PY'
          import os
          import re
          from packaging.version import Version

          version = os.environ["VERSION"].strip()
          if not version:
              raise SystemExit("Invalid version format: empty")

          try:
              Version(version)
          except Exception as exc:
              raise SystemExit(f"Invalid version format: {version} ({exc})") from exc

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"version={version}\n")
          print(f"Resolved version: {version}")
          PY

      - name: Sync project versions
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          python - <<'PY'
          from pathlib import Path
          import re
          import os

          version = os.environ["VERSION"]

          pyproject = Path("pyproject.toml")
          py_content = pyproject.read_text(encoding="utf-8")
          py_updated, py_count = re.subn(
              r'(?m)^version\s*=\s*"[^"]+"\s*$',
              f'version = "{version}"',
              py_content,
              count=1,
          )
          if py_count != 1:
              raise SystemExit("Failed to update version in pyproject.toml")
          pyproject.write_text(py_updated, encoding="utf-8")

          init_file = Path("src/kirei_ui/__init__.py")
          init_content = init_file.read_text(encoding="utf-8")
          init_updated, init_count = re.subn(
              r'(?m)^__version__\s*=\s*"[^"]+"\s*$',
              f'__version__ = "{version}"',
              init_content,
              count=1,
          )
          if init_count != 1:
              raise SystemExit("Failed to update __version__ in src/kirei_ui/__init__.py")
          init_file.write_text(init_updated, encoding="utf-8")

          print(f"Version synced to {version} in pyproject.toml and src/kirei_ui/__init__.py")
          PY
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Build package
        run: python -m build

      - name: Check distributions
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.KireiUI_PYPI }}
        run: twine upload dist/*
