name: Build Wheels (All Platforms/Architectures)

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - main

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.archs }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archs: "x86_64 aarch64"
          - os: windows-latest
            archs: "AMD64 ARM64"
          - os: macos-13
            archs: "x86_64"
          - os: macos-14
            archs: "arm64 universal2"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install cibuildwheel==2.23.3

      - name: Build wheels
        env:
          CIBW_ARCHS: ${{ matrix.archs }}
          CIBW_BUILD_FRONTEND: build
          CIBW_SKIP: "pp* *-musllinux_*"
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.archs }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  sdist:
    name: Source Distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error
