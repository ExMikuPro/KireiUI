name: Build Distributions

on:
  workflow_call:
    inputs:
      version:
        required: false
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g. 0.2.3). If empty on tag context, use tag vX.Y.Z."
        required: false
        type: string
  push:
    branches:
      - develop
      - main

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine packaging

      - name: Resolve version from tag/input
        id: version
        shell: bash
        run: |
          VERSION="${{ inputs.version || github.event.inputs.version || '' }}"
          if [[ -z "${VERSION}" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [[ -z "${VERSION}" ]]; then
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "No version override provided; keep source version."
            exit 0
          fi

          export VERSION
          python - <<'PY'
          import os
          from packaging.version import Version

          version = os.environ["VERSION"].strip()
          Version(version)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"version={version}\n")
          print(f"Resolved version: {version}")
          PY

      - name: Sync project versions
        if: steps.version.outputs.version != ''
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import os

          version = os.environ["VERSION"]

          pyproject = Path("pyproject.toml")
          py_content = pyproject.read_text(encoding="utf-8")
          py_updated, py_count = re.subn(
              r'(?m)^version\s*=\s*"[^"]+"\s*$',
              f'version = "{version}"',
              py_content,
              count=1,
          )
          if py_count != 1:
              raise SystemExit("Failed to update version in pyproject.toml")
          pyproject.write_text(py_updated, encoding="utf-8")

          init_file = Path("src/kirei_ui/__init__.py")
          init_content = init_file.read_text(encoding="utf-8")
          init_updated, init_count = re.subn(
              r'(?m)^__version__\s*=\s*"[^"]+"\s*$',
              f'__version__ = "{version}"',
              init_content,
              count=1,
          )
          if init_count != 1:
              raise SystemExit("Failed to update __version__ in src/kirei_ui/__init__.py")
          init_file.write_text(init_updated, encoding="utf-8")

          print(f"Version synced to {version} in pyproject.toml and src/kirei_ui/__init__.py")
          PY

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/*
          if-no-files-found: error
